name: Ultimate AI Update Manager (Astro + TG)

on:
  push:
    paths:
      - 'ai-updates/**.zip'

jobs:
  unzip-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Unzip, Clean and Overwrite
        run: |
          ZIP_FILE=$(ls ai-updates/*.zip | head -n 1)
          if [ -f "$ZIP_FILE" ]; then
            mkdir ./temp_unzip
            unzip -o "$ZIP_FILE" -d ./temp_unzip
            
            if [ -f "./temp_unzip/delete.txt" ]; then
              while IFS= read -r file_to_delete || [ -n "$file_to_delete" ]; do
                clean_path=$(echo "$file_to_delete" | tr -d '\r' | xargs)
                if [ -n "$clean_path" ] && [ -f "$clean_path" ]; then
                  rm "$clean_path"
                fi
              done < ./temp_unzip/delete.txt
              rm ./temp_unzip/delete.txt
            fi
            cp -r ./temp_unzip/* ./
            rm -rf ./temp_unzip
            rm "$ZIP_FILE"
          else
            echo "Архив не найден."
            exit 1
          fi

      # --- БЛОК 1: АВТОМАТИЧЕСКАЯ ПРОВЕРКА СБОРКИ ---
      - name: Install dependencies & Test Astro Build
        id: astro_build
        run: |
          npm ci
          npm run build # Тестируем сборку сайтов. Если ИИ ошибся в путях — тут процесс остановится.

      # --- БЛОК 2: СОХРАНЕНИЕ ИЗМЕНЕНИЙ (Если сборка прошла успешно) ---
      - name: Commit and Push changes
        if: success()
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "Изменений нет."
          else
            git commit -m "🤖 Авто-обновление сайта (Проверка успешна)"
            git push origin ${{ github.ref_name }}
          fi

      # --- БЛОК 3: УВЕДОМЛЕНИЯ В ТЕЛЕГРАМ ---
      - name: Send Success Telegram Message
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🟢 Проект *elektro* успешно обновлен!
            🛸 Робот проверил сборку Astro — критических ошибок в путях кода нет.
            Сайт отправлен на пересборку хостинга.

      - name: Send Failure Telegram Message
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🔴 Ошибка обновления проекта *elektro*!
            ИИ допустил ошибку в коде или путях файлов. Сборка Astro провалилась.
            ❌ Изменения НЕ были применены. Живой сайт в безопасности.
            Проверьте логи ошибок в панели GitHub Actions.