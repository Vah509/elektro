name: Audit — старі контакти та канонікал

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Пошук старих даних
        run: |
          OUTPUT="audit-contacts.txt"
          echo "АУДИТ КОНТАКТІВ ТА КАНОНІКАЛУ" > $OUTPUT
          echo "Дата: $(date '+%Y-%m-%d %H:%M')" >> $OUTPUT
          echo "" >> $OUTPUT

          echo "=== elektromontazh.kiev.ua (канонікал) ===" >> $OUTPUT
          grep -rn "elektromontazh\.kiev\.ua" src/ >> $OUTPUT || echo "(не знайдено)" >> $OUTPUT
          echo "" >> $OUTPUT

          echo "=== Старий телефон ===" >> $OUTPUT
          grep -rn "509-70-94\|675097094" src/ >> $OUTPUT || echo "(не знайдено)" >> $OUTPUT
          echo "" >> $OUTPUT

          echo "=== Старий email ===" >> $OUTPUT
          grep -rn "5033455@gmail" src/ >> $OUTPUT || echo "(не знайдено)" >> $OUTPUT
          echo "" >> $OUTPUT

          echo "Готово." >> $OUTPUT

      - name: Зберегти результат
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add audit-contacts.txt
          git commit -m "audit: перевірка старих контактів та канонікалу" || echo "Немає змін"
          git push
